name: CI-CD (backend + frontend, single server, no compose)

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        default: ""

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  TAG: ${{ github.sha }}

jobs:
  # 1) backend / frontend 이미지 빌드 & GHCR 푸시
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        part: [ backend, frontend ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK (backend only)
        if: matrix.part == 'backend'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node (frontend only)
        if: matrix.part == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.part }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.part }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.part }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.part }}:latest
          cache-from: type=gha,scope=${{ matrix.part }}
          cache-to: type=gha,scope=${{ matrix.part }},mode=max

  # 2) 서버 배포 (VPN 내부 self-hosted 러너)
  deploy:
    runs-on: [self-hosted]
    needs: build-push
    timeout-minutes: 15
    steps:
      # 👇 추가된 스텝: 실제로 어디에서/어느 도커 데몬에 붙는지 확인
      - name: Sanity check (where am I?)
        run: |
          set -euxo pipefail
          echo "RUNNER_NAME=${RUNNER_NAME:-unknown}"
          echo "RUNNER_TRACKING_ID=${RUNNER_TRACKING_ID:-unknown}"
          echo "== who/where =="; hostname; whoami
          echo "== ip addrs =="; ip -4 addr || true
          echo "== docker.sock =="; ls -l /var/run/docker.sock || true
          echo "== cgroup hint =="; head -n 5 /proc/1/cgroup || true
          echo "== docker info (root dir) =="; docker info 2>/dev/null | grep -E 'Server Version|Docker Root Dir' || true
          echo "== docker ps on this Docker daemon =="; docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}' || true

      - name: "Preflight: require GHCR secrets"
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -e
          [ -n "$GHCR_USERNAME" ]   || { echo "::error::GHCR_USERNAME is empty"; exit 1; }
          [ -n "$GHCR_PULL_TOKEN" ] || { echo "::error::GHCR_PULL_TOKEN is empty"; exit 1; }
          echo "Secrets OK"

      # GHCR 로그인 (private 이미지)
      - name: "GHCR login (private images)"
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          docker logout ghcr.io || true
          echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          echo "Login Succeeded; DOCKER_CONFIG=$DOCKER_CONFIG"

      # 컨테이너 pull & 교체
      - name: "Pull & run containers"
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
          REGISTRY: ghcr.io
          REPO: ${{ github.repository }}
          TAG:  ${{ github.sha }}
        run: |
          set -euo pipefail
          NET="bandeutseolap-net"
          BACKEND_IMAGE="$REGISTRY/$REPO/backend:$TAG"
          FRONTEND_IMAGE="$REGISTRY/$REPO/frontend:$TAG"

          echo "Pulling: $BACKEND_IMAGE"
          echo "Pulling: $FRONTEND_IMAGE"

          docker network inspect "$NET" >/dev/null 2>&1 || docker network create "$NET"

          docker pull "$BACKEND_IMAGE" || { echo "::warning::backend:$TAG not found; trying :latest"; docker pull "$REGISTRY/$REPO/backend:latest"; BACKEND_IMAGE="$REGISTRY/$REPO/backend:latest"; }
          docker pull "$FRONTEND_IMAGE" || { echo "::warning::frontend:$TAG not found; trying :latest"; docker pull "$REGISTRY/$REPO/frontend:latest"; FRONTEND_IMAGE="$REGISTRY/$REPO/frontend:latest"; }

          ENV_PATH="$HOME/bandeutseolap/backend.env"
          ENV_FLAG=""
          if [ -f "$ENV_PATH" ]; then
            ENV_FLAG="--env-file $ENV_PATH"
          else
            echo "::warning::$ENV_PATH not found; starting backend without env-file"
          fi

          docker rm -f bandeutseolap-backend 2>/dev/null || true
          docker run -d --name bandeutseolap-backend \
            --restart=always --network "$NET" \
            $ENV_FLAG \
            "$BACKEND_IMAGE"

          docker rm -f bandeutseolap-frontend 2>/dev/null || true
          docker run -d --name bandeutseolap-frontend \
            --restart=always --network "$NET" \
            -p 80:80 \
            "$FRONTEND_IMAGE"

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1/ >/dev/null; then echo "Frontend OK"; break; fi
            sleep 2
            if [ $i -eq 30 ]; then echo "Frontend healthcheck failed"; exit 1; fi
          done

          if curl -fsS http://bandeutseolap-backend:8080/actuator/health >/dev/null 2>&1; then
            echo "Backend OK"
          else
            echo "Backend healthcheck skipped (add actuator if needed)"
          fi
