name: CI-CD (backend + frontend, compose deploy)

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: git sha)"
        default: ""

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  TAG: ${{ inputs.tag != '' && inputs.tag || github.sha }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  # 1) backend / frontend 이미지 빌드 & GHCR 푸시
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix: { part: [ backend, frontend ] }
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK (backend only)
        if: matrix.part == 'backend'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node (frontend only)
        if: matrix.part == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.part }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.part }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.part }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.part }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
            org.opencontainers.image.title=${{ matrix.part }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.part }}
          cache-to: type=gha,scope=${{ matrix.part }},mode=max

  # 2) 서버 배포
  deploy:
    runs-on: [self-hosted]
    needs: build-push
    timeout-minutes: 20
    steps:
      - name: Checkout repo (get docker-compose.yml)
        uses: actions/checkout@v4

      - name: GHCR login (pull private images)
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          docker logout ghcr.io || true
          echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Create .backend.env next to compose
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          cat > .backend.env <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          SPRING_JACKSON_TIME_ZONE=Asia/Seoul
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SPRING_DATA_REDIS_HOST=redis
          SPRING_DATA_REDIS_PORT=6379
          SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          SPRING_PROFILES_ACTIVE=prod
          EOF
          ls -al .backend.env docker-compose.yml

      - name: Deploy with docker compose
        env:
          COMPOSE_PROJECT_NAME: bandeutseolap
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          docker compose pull
          docker compose up -d
          docker image prune -a -f --filter "until=24h"

      - name: Post-check
        run: |
          set -euo pipefail
          docker compose ps
          docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}'