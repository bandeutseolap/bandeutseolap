name: CI-CD (backend + frontend, single server, no compose)

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: git sha)"
        default: ""

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}
  TAG: ${{ github.sha }}

jobs:
  # 1) backend / frontend 이미지 빌드 & GHCR 푸시
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        part: [ backend, frontend ]
    steps:
      - uses: actions/checkout@v4

      # backend 빌드에만 JDK
      - name: Setup JDK (backend only)
        if: matrix.part == 'backend'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # frontend 빌드에만 Node
      - name: Setup Node (frontend only)
        if: matrix.part == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: docker/setup-buildx-action@v3

      # GHCR 로그인 (푸시용) — GITHUB_TOKEN으로 가능
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 컨텍스트를 backend / frontend 로 바꿔가며 빌드 & 푸시
      - name: Build & Push ${{ matrix.part }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.part }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.part }}:${{ env.TAG }}
            ${{ env.REGISTRY }}/${{ env.REPO }}/${{ matrix.part }}:latest
          cache-from: type=gha,scope=${{ matrix.part }}
          cache-to: type=gha,scope=${{ matrix.part }},mode=max

  deploy:
    runs-on: [ self-hosted ]
    needs: build-push
    timeout-minutes: 15
    steps:
      - name: "GHCR login (private images)"
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          docker logout ghcr.io || true
          echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: "Pull & run containers"
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
          REGISTRY: ghcr.io
          REPO: ${{ github.repository }}   # 예: yelinz515/bandeutseolap
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          NET="bandeutseolap-net"
          BACKEND_IMAGE="$REGISTRY/$REPO/backend:$TAG"
          FRONTEND_IMAGE="$REGISTRY/$REPO/frontend:$TAG"

          echo "Pulling: $BACKEND_IMAGE"
          echo "Pulling: $FRONTEND_IMAGE"

          docker network inspect "$NET" >/dev/null 2>&1 || docker network create "$NET"

          # SHA 태그 pull (없으면 latest로 폴백)
          docker pull "$BACKEND_IMAGE" || { echo "::warning::backend:$TAG not found; trying :latest"; docker pull "$REGISTRY/$REPO/backend:latest"; BACKEND_IMAGE="$REGISTRY/$REPO/backend:latest"; }
          docker pull "$FRONTEND_IMAGE" || { echo "::warning::frontend:$TAG not found; trying :latest"; docker pull "$REGISTRY/$REPO/frontend:latest"; FRONTEND_IMAGE="$REGISTRY/$REPO/frontend:latest"; }

          # --- 여기! env-file을 조건부로 붙임 ---
          ENV_FLAG=""
          if [ -f /opt/bandeutseolap/backend.env ]; then
            ENV_FLAG="--env-file /opt/bandeutseolap/backend.env"
          else
            echo "::warning::/opt/bandeutseolap/backend.env not found; starting backend without env-file"
          fi

          docker rm -f bandeutseolap-backend 2>/dev/null || true
          docker run -d --name bandeutseolap-backend \
            --restart=always --network "$NET" \
            $ENV_FLAG \
            "$BACKEND_IMAGE"

          docker rm -f bandeutseolap-frontend 2>/dev/null || true
          docker run -d --name bandeutseolap-frontend \
            --restart=always --network "$NET" \
            -p 80:80 \
            "$FRONTEND_IMAGE"

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1/ >/dev/null; then echo "Frontend OK"; break; fi
            sleep 2
            if [ $i -eq 30 ]; then echo "Frontend healthcheck failed"; exit 1; fi
          done

          if curl -fsS http://bandeutseolap-backend:8080/actuator/health >/dev/null 2>&1; then
            echo "Backend OK"
          else
            echo "Backend healthcheck skipped (add actuator if needed)"
          fi

