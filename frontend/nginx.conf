server {
  listen 80;
  server_name _;

  # 루트 지정
  root /usr/share/nginx/html;
  index index.html;

  # 버전 파일은 SPA fallback 없이 그대로
  location = /version.txt {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files /version.txt =404;
  }

  # SPA 라우팅: 파일 없으면 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 캐시 전략
  location = /index.html        { add_header Cache-Control "no-cache, must-revalidate"; }
  location = /service-worker.js { add_header Cache-Control "no-store"; }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
